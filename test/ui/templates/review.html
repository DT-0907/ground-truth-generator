<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review: {{ session.video_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container review-app">
        <header class="top-bar">
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm back-btn">Back</a>
            <h1 class="logo">{{ session.video_name }}</h1>
            <div class="header-actions">
                <button id="saveBtn" class="btn btn-success btn-sm">Save (Ctrl+S)</button>
            </div>
        </header>

        <div class="review-layout">
            <!-- Video / Canvas Panel -->
            <div class="video-panel">
                <div class="video-container" id="videoContainer">
                    <canvas id="frameCanvas"></canvas>
                    <canvas id="overlayCanvas"></canvas>
                </div>
                <div class="video-controls">
                    <div class="frame-info">
                        <span>Frame: <strong id="currentFrame">0</strong> / <span id="totalFrames">0</span></span>
                        <span>Time: <span id="currentTime">0:00</span></span>
                    </div>
                    <div class="playback-controls">
                        <button id="prevFrame" class="btn btn-sm">Prev</button>
                        <button id="playPause" class="btn btn-sm btn-accent">Play</button>
                        <button id="nextFrame" class="btn btn-sm">Next</button>
                    </div>
                    <div class="scrubber-container">
                        <input type="range" id="frameScrubber" min="0" max="0" value="0" class="scrubber">
                    </div>
                </div>
            </div>

            <!-- Tracks Panel -->
            <div class="tracks-panel">
                <h2>Tracks</h2>
                <div class="tracks-controls">
                    <input type="text" id="filterTracks" placeholder="Filter tracks..." class="input">
                    <select id="sortTracks" class="select">
                        <option value="id">Sort by ID</option>
                        <option value="class">Sort by Class</option>
                        <option value="confidence">Sort by Confidence</option>
                        <option value="length">Sort by Length</option>
                    </select>
                </div>
                <div class="roi-filter">
                    <label><input type="checkbox" id="roiFilterCheck"> In ROI only</label>
                </div>
                <div id="tracksList" class="tracks-list">
                    <p class="loading">Loading tracks...</p>
                </div>
            </div>
        </div>

        <!-- Track Actions Panel -->
        <div class="actions-panel">
            <h3>Track Actions</h3>
            <div class="action-buttons">
                <button id="deleteTrack" class="btn btn-danger btn-sm" disabled>Delete (D)</button>
                <button id="changeClass" class="btn btn-warning btn-sm" disabled>Class (C)</button>
                <button id="splitTrack" class="btn btn-info btn-sm" disabled>Split (S)</button>
                <button id="mergeTrack" class="btn btn-accent btn-sm" disabled>Merge (M)</button>
            </div>
            <div id="selectedTrackInfo" class="selected-info">
                <p>No track selected. Click a track to select it.</p>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage" class="status-message"></div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const SESSION_ID = '{{ session.id }}';
        const VIDEO_PATH = '{{ session.video_path }}';
        const TRACK_PATH = '{{ session.track_path }}';

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof initReviewApp === 'function') {
                initReviewApp(SESSION_ID, VIDEO_PATH, TRACK_PATH);
            }
        });
    </script>
</body>
</html>
